{% extends "base.html" %}

{% block title %}Library - IRC Book Downloader{% endblock %}

{% block content %}
<div class="library-page">
    <div class="library-header">
        <h2>Your Library</h2>
        <div class="library-stats">
            <span id="totalBooks">0 books</span>
            <span id="totalSize">0 MB</span>
        </div>
    </div>
    
    <div class="library-controls">
        <div class="search-filter-group">
            <input type="text" 
                   id="librarySearch" 
                   placeholder="Search library..." 
                   class="search-input">
            
            <select id="formatFilter" class="filter-select">
                <option value="">All Formats</option>
            </select>
            
            <select id="sourceFilter" class="filter-select">
                <option value="">All Sources</option>
            </select>
            
            <select id="sortBy" class="filter-select">
                <option value="date">Sort by Date</option>
                <option value="title">Sort by Title</option>
                <option value="size">Sort by Size</option>
            </select>
        </div>
    </div>
    
    <div id="libraryContainer" class="library-container">
        <div id="loadingSpinner" class="loading-spinner">Loading library...</div>
        <div id="libraryBooks" class="library-books hidden">
            <!-- Books will be populated by JavaScript -->
        </div>
        <div id="emptyLibrary" class="empty-state hidden">
            <p>Your library is empty. Start by searching for books!</p>
            <a href="{{ url_for('index') }}" class="btn btn-primary">Go to Search</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/library.js') }}"></script>
{% endblock %}
